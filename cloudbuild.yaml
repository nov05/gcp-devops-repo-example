# ------------------------------------------------------------
# Cloud Build CI/CD Pipeline
#
# This configuration defines an automated workflow in Google Cloud
# that builds, pushes, and deploys a Docker container to a VM.
#
# Workflow:
# 1. Trigger:
#    - Runs automatically when code is pushed to the connected GitHub repository.
#
# 2. Build Phase:
#    - Builds a Docker image from the repository source code.
#    - Tags the image using the commit SHA for versioning.
#
# 3. Push Phase:
#    - Pushes the built image to Artifact Registry in the specified region.
#
# 4. Deploy Phase:
#    - Checks whether a Compute Engine VM exists.
#      • If the VM does NOT exist:
#          - Creates a new VM instance
#          - Installs Docker
#          - Pulls and runs the container
#
#      • If the VM already exists:
#          - Pulls the latest image
#          - Stops and removes the existing container (if running)
#          - Starts a new container with the updated image
#
# Notes:
# - The deployment is idempotent and safe to run multiple times.
# - The VM must allow Docker and have permission to pull images.
# - Firewall rules may be required to expose the application (e.g., port 80).
# - $PROJECT_ID, $COMMIT_SHA, $BUILD_ID, and similar variables are built-in substitutions. 
#   Other variables like $$ALLOWED_REGION are not built-in and require $$ to escape.
# - Avoid using emojis in echo commands in real-world scenarios to maintain 
#   compatibility with environments that may not fully support UTF-8 encoding. 
#   They’re fine here for better visualization and a bit of fun.
#
# This setup provides a simple CI/CD pipeline:
# GitHub → Cloud Build → Artifact Registry → Compute Engine VM
# ------------------------------------------------------------

# cloudbuild.yaml
steps:
  # Step 1: Detect Project ID and allowed region/zone
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "👉 Detecting Project ID and allowed region..."
        PROJECT_ID=$$(gcloud config get-value project)
        yes | gcloud services enable orgpolicy.googleapis.com --project=$$PROJECT_ID --quiet
        # Detect allowed lab region
        ALLOWED_REGION=$$(gcloud org-policies describe constraints/gcp.resourceLocations \
          --project=$$PROJECT_ID \
          --format="value(spec.rules[0].values.allowedValues)" \
          | grep -oP '(?<=in:)(us|europe)[a-z0-9-]+(?=-locations)' \
          | head -n 1)
        # Pick first available zone alphabetically
        ALLOWED_ZONE=$$(gcloud compute zones list \
          --filter="region:($$ALLOWED_REGION) AND status:UP" \
          --format="value(name)" \
          | sort \
          | head -n 1)
        echo "PROJECT_ID=$$PROJECT_ID" > /workspace/env_vars.sh
        echo "ALLOWED_REGION=$$ALLOWED_REGION" >> /workspace/env_vars.sh
        echo "ALLOWED_ZONE=$$ALLOWED_ZONE" >> /workspace/env_vars.sh

  # Step 2: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        source /workspace/env_vars.sh
        IMAGE="$$ALLOWED_REGION-docker.pkg.dev/$$PROJECT_ID/devops-repo/devops-image:$COMMIT_SHA"
        echo "👉 Building Docker image: $$IMAGE"
        docker build -t "$$IMAGE" .
        echo "👉 Pushing Docker image: $$IMAGE"
        docker push "$$IMAGE"
        # Optional: track the image in Cloud Build
        gcloud builds add-iam-policy-binding $BUILD_ID \
          --artifact="$$IMAGE"
        echo "IMAGE=$$IMAGE" >> /workspace/env_vars.sh
        echo "👉 $$(date) - Building Docker image for commit $COMMIT_SHA: $$IMAGE" | tee -a /workspace/deployment.log

  # Step 3: Create or redeploy VM
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        source /workspace/env_vars.sh
        VM_NAME="devops-vm"
        LOG_FILE="/workspace/deployment.log"
  
        # Check if VM exists
        if gcloud compute instances describe $$VM_NAME --zone=$$ALLOWED_ZONE >/dev/null 2>&1; then
          echo "👉 VM $$VM_NAME exists → redeploying Docker container"
          gcloud compute ssh $$VM_NAME --zone=$$ALLOWED_ZONE --command "
            set -e
            sudo gcloud auth configure-docker $$ALLOWED_REGION-docker.pkg.dev --quiet
            sudo docker pull $$IMAGE
            sudo docker stop app || true
            sudo docker rm app || true
            sudo docker run -d -p 80:80 --name app $$IMAGE
          "
        else
          echo "👉 VM $$VM_NAME does not exist → creating VM"
          gcloud compute instances create $$VM_NAME \
            --zone=$$ALLOWED_ZONE \
            --machine-type=e2-medium \
            --image-family=debian-12 \
            --image-project=debian-cloud \
            --tags=http-server,https-server \
            --scopes=https://www.googleapis.com/auth/cloud-platform\
            --labels=deployed-by=cloud-build,commit-sha=$COMMIT_SHA
  
          echo "👉 Waiting for SSH to become available..."
          for i in {1..12}; do
            if gcloud compute ssh $$VM_NAME --zone=$$ALLOWED_ZONE --command "echo ready" -q >/dev/null 2>&1; then
              break
            fi
            echo "SSH not ready yet... retrying in 10s"
            sleep 10
          done
  
          echo "👉 Installing Docker and running container on new VM"
          gcloud compute ssh $$VM_NAME --zone=$$ALLOWED_ZONE --command "
            set -e
            sudo apt-get update
            sudo apt-get install -y docker.io
            sudo systemctl start docker
            sudo usermod -aG docker \$$USER
            sudo gcloud auth configure-docker $$ALLOWED_REGION-docker.pkg.dev --quiet
            sudo docker pull $$IMAGE
            sudo docker run -d -p 80:80 --name app $$IMAGE

            # Self-signed cert
            sudo mkdir -p /etc/ssl/certs /etc/ssl/private
            sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
              -keyout /etc/ssl/private/selfsigned.key \
              -out /etc/ssl/certs/selfsigned.crt \
              -subj \"/C=US/ST=State/L=City/O=DevOps/OU=IT/CN=$$(curl -s ifconfig.me)\"
            
            # Configure Nginx reverse proxy
            sudo bash -c \"cat > /etc/nginx/sites-available/app <<EOF
server {
    listen 80;
    server_name _;
    location / {
        proxy_pass http://127.0.0.1:80;
        proxy_set_header Host \$$host;
        proxy_set_header X-Real-IP \$$remote_addr;
        proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$$scheme;
    }
}
EOF\" &&
          sudo ln -sf /etc/nginx/sites-available/app /etc/nginx/sites-enabled/app &&
          sudo nginx -t &&
          sudo systemctl restart nginx &&
          # Optional: automatically get a free SSL cert (requires domain pointing to VM public IP)
          # sudo certbot --nginx --non-interactive --agree-tos -m your-email@example.com -d yourdomain.com
          "
        fi
  
        echo "👉 $$(date) - Deploying commit $COMMIT_SHA to VM $$VM_NAME in zone $$ALLOWED_ZONE" | tee -a $$LOG_FILE
        echo "$$VM_NAME,$$ALLOWED_ZONE,$$IMAGE" >> /workspace/deployed-vms.csv
        
  # Step 4: Ensure firewall rule exists
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "👉 Ensuring HTTP firewall rule exist..."
        if ! gcloud compute firewall-rules describe allow-http >/dev/null 2>&1; then
          # Create HTTP firewall rule
          gcloud compute firewall-rules create allow-http \
            --allow tcp:80 \
            --target-tags=http-server \
            --description="Allow HTTP traffic" || echo "HTTP rule may already exist"
          echo "Firewall rule created."
        else
          echo "Firewall rule already exists."
        fi

        echo "👉 Ensuring HTTPS firewall rule exist..."
        if ! gcloud compute firewall-rules describe allow-https >/dev/null 2>&1; then
          # Create HTTPS firewall rule
          gcloud compute firewall-rules create allow-https \
            --allow tcp:443 \
            --target-tags=https-server \
            --description="Allow HTTPS traffic" || echo "HTTPS rule may already exist"
          echo "Firewall rule created."
        else
          echo "Firewall rule already exists."
        fi
        
options:
  logging: CLOUD_LOGGING_ONLY
